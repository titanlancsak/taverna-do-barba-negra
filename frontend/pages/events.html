<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イベント - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1></h1>
  </header>

  <main class="content-list">
    <h2>イベント</h2>

    <div id="event-form-box">
      <h3>イベントを作成</h3>
      <input type="text" id="event-name-input" placeholder="イベント名" maxlength="150">
      <div class="event-form-row">
        <input type="text" id="event-date-input" placeholder="YYYY/MM/DD" maxlength="10" inputmode="numeric">
        <label for="event-time-input">Event Time Input</label>
        <input type="time" id="event-time-input">
      </div>
      <input type="text" id="event-location-input" placeholder="場所" maxlength="200">
      <textarea id="event-description-input" placeholder="説明" maxlength="2000" rows="3"></textarea>
      <div class="event-form-actions">
        <label for="event-photo-input" class="file-label">📷 写真を追加</label>
        <input type="file" id="event-photo-input" accept="image/*">
        <span id="event-photo-filename"></span>
        <button id="event-submit-btn">イベントを作成</button>
      </div>
      <p id="event-status-message"></p>
    </div>

    <div id="events-list">
      <p>イベントを読み込み中...</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="../js/session.js"></script>
  <script src="../js/events.js"></script>
</body>
</html>
