<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friends - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard Tavern 🍺</h1>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main class="content-list">
    <h2>Friends</h2>

    <div id="add-friend-box">
      <input type="email" id="add-friend-email" placeholder="Add friend by school email">
      <button id="add-friend-btn">Send Request</button>
      <p id="add-friend-status"></p>
    </div>

    <h3>Pending Requests</h3>
    <div id="pending-requests-list"><p>Loading...</p></div>

    <h3>My Friends</h3>
    <div id="friends-list"><p>Loading...</p></div>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="../js/session.js"></script>
  <script src="../js/friends.js"></script>
</body>
</html>
