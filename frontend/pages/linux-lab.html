<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linuxラボ - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
  <style>
    /* Sobrescreve o `main { max-width: 500px }` global só nesta página */
    #lab-main {
      max-width: none;
      padding: 30px 40px;
    }
    #lab-wrap { max-width: 1100px; margin: 0 auto; }
    #lab-screen {
      background-color: #000;
      border: 1px solid #3a2c1e;
      border-radius: 8px;
      padding: 10px;
      overflow: auto;
      min-height: 640px;
    }
    #lab-screen > div {
      white-space: pre;
      font: 16px monospace;
      line-height: 18px;
      color: #d0d0d0;
    }
    #lab-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0;
    }
    #lab-status { font-size: 13px; color: #8a7a68; }
    #lab-note { font-size: 13px; color: #8a7a68; margin-top: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <h1></h1>
  </header>

  <main id="lab-main">
    <div id="lab-wrap">
      <h2>Linuxラボ</h2>
      <p>ブラウザ上で動く使い捨ての Linux 環境です。コマンドを自由に試せます。ページを閉じるとすべて消えます。</p>

      <div id="lab-toolbar">
        <button id="lab-restart">再起動</button>
        <span id="lab-status"></span>
      </div>

      <div id="lab-screen">
        <div></div>
        <canvas style="display: none;"></canvas>
      </div>

      <p id="lab-note">
        ※ すべてあなたのブラウザ内で動くため、サーバーには何も残りません。<br>
        初回はイメージの読み込みに少し時間がかかります。画面をクリックしてから入力してください。
      </p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="../assets/v86/libv86.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/linux-lab.js"></script>
</body>
</html>
