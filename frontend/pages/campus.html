<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャンパス - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
  <style>
    #campus-main {
      /* Sobrescreve o `main { max-width: 500px; margin: 0 auto }` global (tools.css)
         só nesta página, pra o jogo ocupar a largura toda. Não afeta outras páginas. */
      padding: 0;
      max-width: none;
      width: 100%;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    #game-hint {
      color: #8a7a68;
      font-size: 13px;
      padding: 8px;
      text-align: center;
    }
    #game-container {
      flex: 1;
      width: 100%;
      min-height: 380px;
      background-color: #2d572d;
    }
    #game-container canvas {
      display: block;
    }
    #campus-chat {
      background-color: #2c1e12;
      border-top: 1px solid #3a2c1e;
      padding: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    #campus-music-btn {
      background-color: #3a2c1e;
      border: 1px solid #3a2c1e;
      border-radius: 20px;
      padding: 7px 12px;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
    }
    #campus-music-btn:hover {
      background-color: #4a3a2a;
    }
    #campus-chat-input {
      width: 100%;
      max-width: 480px;
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid #3a2c1e;
      background-color: #1b120a;
      color: #f5f0e6;
      font-size: 14px;
      outline: none;
    }
    #campus-chat-input:focus {
      border-color: #d4a017;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard Tavern 🍺</h1>
  </header>

  <main id="campus-main">
    <p id="game-hint">矢印キーまたは WASD で移動 · Enter でチャット</p>
    <div id="game-container"></div>
    <div id="campus-chat">
      <button id="campus-music-btn" title="音楽">🎵</button>
      <input type="text" id="campus-chat-input" maxlength="100" placeholder="Enter を押してチャット…">
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/campus-map.js"></script>
  <script src="../js/campus.js"></script>
</body>
</html>
