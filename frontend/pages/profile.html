<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイプロフィール - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1></h1>
  </header>

  <main>
    <h2>マイプロフィール</h2>

    <div id="profile-picture-section">
      <img id="profile-preview" src="../assets/profile-pictures/default.png" alt="プロフィール写真" width="120" height="120" style="border-radius: 50%; object-fit: cover;">
      <input type="file" id="picture-input" accept="image/png, image/jpeg, image/webp">
      <button id="upload-picture-btn">写真をアップロード</button>
    </div>

    <form id="profile-form">
      <label for="display-name-input">表示名</label>
      <input type="text" id="display-name-input" maxlength="50" placeholder="他のユーザーに表示される名前">

      <label>
        <input type="checkbox" id="anonymous-checkbox">
        匿名のままにする（他のユーザーに名前を表示しない）
      </label>

      <label for="course-input">コース</label>
      <input type="text" id="course-input" maxlength="100" placeholder="例：情報技術">

      <label for="gender-select">性別</label>
      <select id="gender-select">
        <option value="">回答しない</option>
        <option value="Male">男性</option>
        <option value="Female">女性</option>
        <option value="Other">その他</option>
      </select>

      <button type="submit">プロフィールを保存</button>
    </form>

    <p id="status-message"></p>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="../js/session.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
