<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音声コンバーター - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard Tavern 🍺</h1>
  </header>

  <main>
    <h2>音声フォーマットコンバーター</h2>
    <p>音声ファイルをアップロードして別のフォーマットに変換します。</p>

    <form id="convert-form">
      <input type="file" id="audio-input" accept="audio/*" required>

      <label for="format-select">変換先:</label>
      <select id="format-select">
        <option value="mp3">MP3</option>
        <option value="wav">WAV</option>
        <option value="ogg">OGG</option>
        <option value="aac">AAC</option>
        <option value="flac">FLAC</option>
        <option value="m4a">M4A</option>
      </select>

      <button type="submit">変換</button>
    </form>

    <p id="status-message"></p>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="../js/audio-converter.js"></script>
  <script src="../js/session.js"></script>
</body>
</html>
