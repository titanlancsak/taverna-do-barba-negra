<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動画・音声ダウンローダー - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard Tavern 🍺</h1>
  </header>

  <main>
    <h2>動画・音声ダウンローダー</h2>
    <p>リンクを貼り付けて、動画（MP4）または音声（MP3）としてダウンロードします。</p>

    <form id="download-form">
      <input type="url" id="url-input" placeholder="https://..." required>

      <label for="type-select">ダウンロード形式:</label>
      <select id="type-select">
        <option value="video">動画 (MP4)</option>
        <option value="audio">音声 (MP3)</option>
      </select>

      <button type="submit">ダウンロード</button>
    </form>

    <p id="status-message"></p>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="../js/video-downloader.js"></script>
  <script src="../js/session.js"></script>
</body>
</html>
