<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1></h1>
  </header>

  <main>
    <h2>アカウントを作成</h2>
    <p>@g.neec.ac.jp のメールを持つ学生のみ登録できます。</p>

    <form id="register-form">
      <input type="email" id="email-input" placeholder="yourname@g.neec.ac.jp" required>
      <input type="password" id="password-input" placeholder="パスワード（8文字以上）" required minlength="8">
      <button type="submit">新規登録</button>
    </form>

    <p id="status-message"></p>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="../js/register.js"></script>
  <script src="../js/session.js"></script>
</body>
</html>
