<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Blackbeard's Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard's Tavern 🍺</h1>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <h2>Create Your Account</h2>
    <p>Only students with a @g.neec.ac.jp email can join.</p>

    <form id="register-form">
      <input type="email" id="email-input" placeholder="yourname@g.neec.ac.jp" required>
      <input type="password" id="password-input" placeholder="Password (min. 8 characters)" required minlength="8">
      <button type="submit">Sign Up</button>
    </form>

    <p id="status-message"></p>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard's Tavern</p>
  </footer>

  <script src="../js/register.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/session.js"></script>
</body>
</html>
