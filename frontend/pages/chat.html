<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard Tavern 🍺</h1>
    <nav>
      <a href="../index.html">Home</a>
    </nav>
  </header>

  <main>
    <h2>Chat</h2>
    <p>Select a friend below to start chatting.</p>
    <div id="conversations-list"></div>
  </main>

  <!-- Widget de chat flutuante -->
  <div id="chat-widget" style="display:none;">
    <div id="chat-widget-header">
      <img id="chat-widget-avatar" src="" alt="">
      <span id="chat-widget-name"></span>
      <button id="chat-widget-close">✕</button>
    </div>
    <div id="chat-widget-messages"></div>
    <div id="chat-widget-input-box">
      <label for="chat-widget-media-input" id="chat-widget-attach-btn">📎</label>
      <input type="file" id="chat-widget-media-input" accept="image/*,video/*">
      <input type="text" id="chat-widget-input" placeholder="Type a message...">
      <button id="chat-widget-send">➤</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
