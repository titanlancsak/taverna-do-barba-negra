<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Blackbeard Tavern</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tools.css">
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard Tavern 🍺</h1>
    <nav>
      <a href="../index.html">Home</a>
      <a href="friends.html">Friends</a>
      <a href="chat.html">Chat</a>
    </nav>
  </header>

  <main>
    <h2>Chat</h2>

    <div id="chat-layout">
      <div id="conversations-panel">
        <h3>Conversations</h3>
        <div id="conversations-list"><p>Loading...</p></div>
        <hr>
        <h3>Start new chat</h3>
        <select id="friend-select"><option value="">Select a friend...</option></select>
      </div>

      <div id="chat-panel">
        <div id="chat-header"><p>Select a conversation to start chatting</p></div>
        <div id="messages-container"></div>
        <div id="message-input-box" style="display:none;">
          <input type="text" id="message-input" placeholder="Type a message..." maxlength="2000">
          <button id="send-message-btn">Send</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/session.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
