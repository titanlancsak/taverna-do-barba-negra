<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackbeard's Tavern</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tools.css">
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard's Tavern 🍺</h1>
    <nav>
      <a href="pages/image-converter.html">Image Converter</a>
      <a href="pages/video-downloader.html">Video/Audio Downloader</a>
      <a href="pages/audio-converter.html">Audio Converter</a>
      <a href="pages/music-player.html">Music Player</a>
      <a href="pages/free-books.html">Free Books</a>
      <a href="pages/linux-distros.html">Linux Distros</a>
      <a href="pages/scripts.html">Useful Scripts</a>
    </nav>
  </header>

  <main>
    <p>Welcome to Blackbeard's Tavern — your all-in-one toolbox.</p>

    <section id="feed-section">
      <h2>Community Feed</h2>

      <div id="post-form-box">
        <textarea id="post-content-input" placeholder="What's on your mind, pirate?" maxlength="1000" rows="1"></textarea>
        <div class="post-form-actions">
          <label for="post-media-input" class="file-label">📎 Attach media</label>
          <input type="file" id="post-media-input" accept="image/*,video/*">
          <span id="post-media-filename"></span>
          <button id="post-submit-btn">Post</button>
        </div>
        <p id="post-status-message"></p>
      </div>

      <div id="posts-container">
        <p>Loading feed...</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard's Tavern</p>
  </footer>
  <script src="js/session.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
