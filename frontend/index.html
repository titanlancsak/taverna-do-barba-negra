<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackbeard Tavern</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tools.css">
</head>
<body>
  <header>
    <h1>🏴‍☠️ Blackbeard Tavern 🍺</h1>
  </header>

  <main>
    <p>Blackbeard Tavern へようこそ — オールインワンのツールボックスです。</p>

    <section id="feed-section">
      <h2>コミュニティフィード</h2>

      <div id="post-form-box">
        <textarea id="post-content-input" placeholder="いま何を考えていますか、海賊さん？" maxlength="1000" rows="1"></textarea>
        <div class="post-form-actions">
          <label for="post-media-input" class="file-label">📎 メディアを添付</label>
          <input type="file" id="post-media-input" accept="image/*,video/*">
          <span id="post-media-filename"></span>
          <button id="post-submit-btn">投稿</button>
        </div>
        <p id="post-status-message"></p>
      </div>

      <div id="posts-container">
        <p>フィードを読み込み中...</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Blackbeard Tavern</p>
  </footer>
  <script src="js/session.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
